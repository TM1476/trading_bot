<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Bot Dashboard</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: #065f46;
        }

        .error {
            background: #7f1d1d;
        }

        .loading {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚀 Trading Bot</h2>

    <form id="orderForm">
        <label>Symbol</label>
        <input name="symbol" value="BTCUSDT">

        <label>Side</label>
        <select name="side">
            <option>BUY</option>
            <option>SELL</option>
        </select>

        <label>Order Type</label>
        <select name="type" id="orderType">
            <option>MARKET</option>
            <option>LIMIT</option>
        </select>

        <label>Quantity</label>
        <input name="quantity" type="number" step="0.001">

        <label id="priceLabel">Price</label>
        <input name="price" type="number" step="0.01" id="priceField">

        <button type="submit">Place Order</button>
    </form>

    <div class="loading" id="loading">⏳ Processing...</div>

    <div class="result" id="result"></div>
</div>

<script>
    const form = document.getElementById("orderForm");
    const resultBox = document.getElementById("result");
    const loading = document.getElementById("loading");
    const orderType = document.getElementById("orderType");
    const priceField = document.getElementById("priceField");
    const priceLabel = document.getElementById("priceLabel");

    loading.style.display = "none";

    orderType.addEventListener("change", () => {
        if (orderType.value === "MARKET") {
            priceField.style.display = "none";
            priceLabel.style.display = "none";
        } else {
            priceField.style.display = "block";
            priceLabel.style.display = "block";
        }
    });

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        loading.style.display = "block";
        resultBox.style.display = "none";

        const formData = new FormData(form);

        try {
            const response = await fetch("/order", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            loading.style.display = "none";
            resultBox.style.display = "block";

            if (data.status === "success") {
                resultBox.className = "result success";
                resultBox.innerHTML = `
                    ✅ Order Placed Successfully <br><br>
                    Order ID: ${data.data.orderId} <br>
                    Status: ${data.data.status} <br>
                    Quantity: ${data.data.executedQty}
                `;
            } else {
                resultBox.className = "result error";
                resultBox.innerHTML = `❌ ${data.message}`;
            }

        } catch (err) {
            loading.style.display = "none";
            resultBox.style.display = "block";
            resultBox.className = "result error";
            resultBox.innerHTML = "❌ Network Error";
        }
    });
</script>

</body>
</html>
