<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Bot </title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* Chart area */
#chart {
    width: 65%;
    height: 100%;
    background: #020617;
}

/* Panel */
.panel {
    width: 35%;
    padding: 20px;
    border-left: 1px solid #1e293b;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #1e293b;
    border: none;
    color: white;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    display: none;
}

.success { background: rgba(34,197,94,0.2); }
.error { background: rgba(239,68,68,0.2); }
</style>
</head>

<body>

<canvas id="chart"></canvas>

<div class="panel">
    <h2>Trading Bot</h2>

    <form id="orderForm">
        <input name="symbol" value="BTCUSDT">
        <select name="side">
            <option>BUY</option>
            <option>SELL</option>
        </select>
        <select name="type">
            <option>MARKET</option>
            <option>LIMIT</option>
        </select>
        <input name="quantity" placeholder="Quantity">
        <input name="price" placeholder="Price">
        <button type="submit">Place Order</button>
    </form>

    <div class="result" id="result"></div>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

// Responsive canvas
function resizeCanvas() {
    canvas.width = window.innerWidth * 0.65;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let candles = [];
let lastPrice = 100;

// Generate initial candles
for (let i = 0; i < 50; i++) {
    const open = lastPrice;
    const close = open + (Math.random() - 0.5) * 10;
    const high = Math.max(open, close) + Math.random() * 5;
    const low = Math.min(open, close) - Math.random() * 5;

    candles.push({ open, close, high, low });
    lastPrice = close;
}

// 🔥 Get dynamic min/max
function getBounds() {
    let min = Infinity;
    let max = -Infinity;

    candles.forEach(c => {
        if (c.low < min) min = c.low;
        if (c.high > max) max = c.high;
    });

    return { min, max };
}

// 📊 Draw candles
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const { min, max } = getBounds();
    const range = max - min;

    const candleWidth = 8;
    const gap = 4;

    candles.forEach((candle, i) => {
        const x = i * (candleWidth + gap) + 50;

        const scale = canvas.height / range;

        const openY = canvas.height - (candle.open - min) * scale;
        const closeY = canvas.height - (candle.close - min) * scale;
        const highY = canvas.height - (candle.high - min) * scale;
        const lowY = canvas.height - (candle.low - min) * scale;

        const isGreen = candle.close > candle.open;

        ctx.strokeStyle = isGreen ? "#22c55e" : "#ef4444";
        ctx.fillStyle = isGreen ? "#22c55e" : "#ef4444";

        // Wick
        ctx.beginPath();
        ctx.moveTo(x + candleWidth/2, highY);
        ctx.lineTo(x + candleWidth/2, lowY);
        ctx.stroke();

        // Body
        ctx.fillRect(
            x,
            Math.min(openY, closeY),
            candleWidth,
            Math.abs(openY - closeY) || 1
        );
    });
}

// 🔥 Animate candles
setInterval(() => {
    const last = candles[candles.length - 1];

    const open = last.close;
    const close = open + (Math.random() - 0.5) * 10;
    const high = Math.max(open, close) + Math.random() * 5;
    const low = Math.min(open, close) - Math.random() * 5;

    candles.push({ open, close, high, low });

    if (candles.length > 60) candles.shift();

    draw();
}, 800);

// Initial draw
draw();
</script>
    
</body>
</html>
